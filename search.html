<!doctype html>
<html lang="zh-CN">
<head>
  
    
    
  
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>搜索</title>
  <meta name="description" content="搜索会覆盖文章正文、目录页和标签页。">
  <link rel="alternate" type="application/rss+xml" title="Notebook RSS" href="feed.xml">
  <link rel="stylesheet" href="assets/site.css">
  
</head>
<body>
  
    
    
    
    
    
    
  

  <nav class="breadcrumb-bar" aria-label="博客路径">
    
      
        <a href="index.html">Notebook</a>
        <span aria-hidden="true">›</span>
      
        <a href="search.html">搜索</a>
        
      
    
  </nav>

  <div class="page-shell">
    <header id="title-block-header" class="hero-grid">
      <div class="hero-spacer" aria-hidden="true"></div>
      <div class="hero-content">
        <div class="eyebrow">Notebook</div>
        <h1>搜索</h1>
        
          <p class="subtitle">搜索会覆盖文章正文、目录页和标签页。</p>
        
        <div class="meta">
          
          
          <a class="chip" href="search.html">搜索</a>
          <a class="chip" href="tags/index.html">标签</a>
          <a class="chip" href="feed.xml">RSS</a>
        </div>
        <hr class="article-divider">
      </div>
    </header>
  </div>

  <input class="toc-state" type="checkbox" id="mobile-toc-state" aria-hidden="true">
  <label class="toc-backdrop" for="mobile-toc-state" aria-hidden="true"></label>
  <label class="mobile-toc-button" for="mobile-toc-state" aria-controls="page-toc">
    <span>目录</span>
  </label>

  <div class="content-grid">
    <nav id="page-toc" class="toc" aria-label="目录">
      <div class="toc-head">
        <div class="toc-title">目录</div>
        <label class="toc-close" for="mobile-toc-state" aria-label="关闭目录">×</label>
      </div>
      
        <ol>
          
            <li><a href="#search">搜索</a></li>
          
        </ol>
      
    </nav>

    <main class="article-content" data-pagefind-body>
      <section id="search" class="search-page">
  <h2><span class="section-index">1</span><span class="section-title">搜索</span></h2>
  <div id="search-box"></div>
</section>
<link href="pagefind/pagefind-ui.css" rel="stylesheet">
<script src="pagefind/pagefind-ui.js"></script>
<script src="assets/search.js"></script>

    </main>
  </div>
  <script>
    (() => {
      const state = document.getElementById("mobile-toc-state");
      const toc = document.getElementById("page-toc");
      if (!state || !toc) return;
      toc.addEventListener("click", (event) => {
        if (event.target.closest("a")) state.checked = false;
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") state.checked = false;
      });
    })();
  </script>
</body>
</html>
