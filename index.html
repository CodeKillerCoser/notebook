<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notebook — 文件目录</title>
<style>
  :root {
    --bg: #f8f9fa;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #2563eb;
    --accent-soft: #e8f0fe;
    --hover: #f3f4f6;
    --icon-dir: #f59e0b;
    --icon-file: #6b7280;
    --icon-md: #2563eb;
    --icon-html: #dc2626;
    --icon-py: #16a34a;
    --icon-rs: #c026d3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111827;
      --card: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #374151;
      --accent: #60a5fa;
      --accent-soft: #1e3a5f;
      --hover: #374151;
      --icon-dir: #fbbf24;
      --icon-file: #9ca3af;
      --icon-md: #60a5fa;
      --icon-html: #f87171;
      --icon-py: #4ade80;
      --icon-rs: #d946ef;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .header {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px 8px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px 24px 64px;
  }
  .tree { list-style: none; padding-left: 0; }
  .tree ul { list-style: none; padding-left: 20px; }
  .tree li { margin: 1px 0; }
  .tree a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    border-radius: 6px;
    color: var(--text);
    text-decoration: none;
    font-size: 15px;
    transition: background 0.15s;
    width: 100%;
    max-width: 100%;
  }
  .tree a:hover { background: var(--hover); text-decoration: none; }
  .tree a:visited { color: var(--text); }
  .icon { width: 18px; height: 18px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 16px; }
  .icon-dir { color: var(--icon-dir); }
  .icon-md { color: var(--icon-md); }
  .icon-html { color: var(--icon-html); }
  .icon-py { color: var(--icon-py); }
  .icon-rs { color: var(--icon-rs); }
  .icon-file { color: var(--icon-file); }
  .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ext { color: var(--muted); font-size: 12px; margin-left: auto; flex-shrink: 0; }
  .dir-toggle {
    cursor: pointer;
    user-select: none;
    padding: 4px 4px 4px 0;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .dir-toggle:hover { background: var(--hover); }
  .dir-toggle .arrow { display: inline-block; width: 14px; transition: transform 0.2s; font-size: 12px; color: var(--muted); }
  .dir-toggle .arrow.open { transform: rotate(90deg); }
  .dir-toggle .icon { pointer-events: none; }
  .dir-children { display: none; }
  .dir-children.open { display: block; }
  .readme-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    padding: 8px 14px;
    background: var(--accent-soft);
    border-radius: 8px;
    color: var(--accent);
    font-size: 14px;
    text-decoration: none;
  }
  .readme-link:hover { opacity: 0.8; text-decoration: none; }
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 32px 24px;
  }
  @media (max-width: 600px) {
    .header { padding: 24px 16px 8px; }
    .container { padding: 8px 16px 40px; }
    .tree ul { padding-left: 12px; }
    .tree a { font-size: 14px; padding: 3px 8px; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>📒 Notebook</h1>
  <p>2 个目录 · 5 个文件</p>
</div>
<div class="container">
  <a class="readme-link" href="README.md">📄 README.md</a>
  <ul class="tree">
    <li>
      <span class="dir-toggle"><span class="arrow">▶</span><span class="icon icon-dir">📁</span><span class="name">rust</span></span>
      <ul class="dir-children">
      <li><a href="rust/1.html"><span class="icon icon-html">🌐</span><span class="name">1.html</span><span class="ext">HTML</span></a></li>
      </ul>
    </li>
    <li>
      <span class="dir-toggle"><span class="arrow">▶</span><span class="icon icon-dir">📁</span><span class="name">代码大全阅读笔记</span></span>
      <ul class="dir-children">
      <li><a href="代码大全阅读笔记/ch2-理解编程.md"><span class="icon icon-md">📝</span><span class="name">ch2-理解编程.md</span><span class="ext">MD</span></a></li>
      <li><a href="代码大全阅读笔记/ch3-软件开发先决条件.md"><span class="icon icon-md">📝</span><span class="name">ch3-软件开发先决条件.md</span><span class="ext">MD</span></a></li>
      </ul>
    </li>
    <li><a href=".gitignore"><span class="icon icon-file">📄</span><span class="name">.gitignore</span><span class="ext">GITIGNORE</span></a></li>
    <li><a href="ai_runtime_learning_plan.html"><span class="icon icon-html">🌐</span><span class="name">ai_runtime_learning_plan.html</span><span class="ext">HTML</span></a></li>
  </ul>
</div>
<div class="footer">
  自动生成于 2026-05-09 15:37:39
</div>
<script>
  document.querySelectorAll('.dir-toggle').forEach(toggle => {
    toggle.addEventListener('click', function(e) {
      e.preventDefault();
      const children = this.nextElementSibling;
      const arrow = this.querySelector('.arrow');
      if (children && children.classList.contains('dir-children')) {
        children.classList.toggle('open');
        arrow.classList.toggle('open');
      }
    });
  });
</script>
</body>
</html>
